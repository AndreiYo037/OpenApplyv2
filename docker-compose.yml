services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openapply-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openapply-frontend
    ports:
      - "5173:4173"
    depends_on:
      - backend
    restart: unless-stopped
